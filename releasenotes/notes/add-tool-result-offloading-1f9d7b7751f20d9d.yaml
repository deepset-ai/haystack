---
features:
  - |
    Added tool result offloading for the ``Agent`` via the new ``haystack.hooks.tool_result_offloading`` module.
    ``ToolResultOffloadHook`` is an ``after_tool`` hook that writes selected tool results to a ``ToolResultStore`` and
    replaces them in the conversation with a compact pointer (reference plus a short preview), so the next LLM call
    sees a reference instead of the full result. This helps manage the context window and is a step towards letting an
    Agent operate on offloaded results with follow-up tools (e.g. a bash tool reading the referenced files).

    Which tools offload, and under what condition, is configured per tool via ``offload_strategies``, mapping a tool
    name (or a tuple of tool names, or the wildcard ``"*"``) to an ``OffloadPolicy``: ``AlwaysOffload``,
    ``NeverOffload``, ``OffloadOverChars`` (offload when the result exceeds a character threshold), or
    ``CallableOffloadPolicy`` (a custom condition). More specific keys win over the ``"*"`` default. The module ships
    ``FileSystemToolResultStore`` for writing results to the local file system; implement the ``ToolResultStore``
    protocol to target other backends. For request-scoped stores in server settings, pass a store per run via the
    Agent's ``hook_context``.

    Only real, successful text results are offloaded: error results (including ``before_tool`` rejections) are left in
    context, non-string (multimodal) results are left in context with a warning, and each result is offloaded at most
    once.

    .. code-block:: python

        from haystack.components.agents import Agent
        from haystack.hooks.tool_result_offloading import (
            FileSystemToolResultStore,
            OffloadOverChars,
            ToolResultOffloadHook,
        )

        hook = ToolResultOffloadHook(
            store=FileSystemToolResultStore(root="tool_results"),
            offload_strategies={"*": OffloadOverChars(4000)},
        )
        agent = Agent(chat_generator=..., tools=[...], hooks={"after_tool": [hook]})

---
enhancements:
  - |
    `select_streaming_callback` now accepts a sync streaming callback in async contexts
    (e.g. `run_async`), emitting a `UserWarning` instead of raising. The callback runs
    inline on the event loop and may block it, so async callbacks remain preferred for
    performance. The reverse case (an async callback in `run`) still raises, since
    there is no way to await a coroutine from sync code.

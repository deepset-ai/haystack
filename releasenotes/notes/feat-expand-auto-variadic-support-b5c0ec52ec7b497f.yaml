---
features:
  - |
    We now allow a component's whose input type is typed as a union of lists (e.g. ``list[str] | list[ChatMessage]``) to allow multiple input connections.
    Previously we only supported bare lists (e.g. ``list[str]``) or optional lists (e.g. ``list[str] | None``) to allow multiple input connections.
    A common use case for this is using the ``AnswerBuilder`` component which has it's ``replies`` input typed as ``list[str] | list[ChatMessage]``.

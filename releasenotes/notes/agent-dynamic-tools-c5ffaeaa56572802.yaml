---
enhancements:
  - |
    Duplicate tool names are now detected at the start of each ``Agent`` step (before the chat generator call)
    instead of only at tool execution, so the error surfaces earlier and the LLM is never sent duplicate tool schemas.
fixes:
  - |
    ``Agent`` now correctly executes tools supplied only at runtime via ``run(tools=...)`` / ``run_async(tools=...)``
    when no tools were provided at initialization. Previously the run stopped after the first LLM call because the
    step guard checked the init-time tools instead of the tools resolved for the run.
upgrade:
  - |
    ``Agent`` no longer validates ``exit_conditions`` against tool names at initialization, and no longer flattens
    tools at init (which could prematurely warm up a ``SearchableToolset``). Exit conditions are now evaluated at
    runtime, so a condition naming a tool that is loaded later — e.g. a tool passed at runtime or one discovered by
    ``SearchableToolset`` — works as expected. Consequently, an unknown exit-condition name no longer raises a
    ``ValueError`` at construction.
other:
  - |
    The warning logged when an ``Agent`` is created without tools has been removed, since tools can be provided at
    runtime via ``run(tools=...)``.

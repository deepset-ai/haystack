---
deprecations:
  - |
    ``DatadogTracer`` is deprecated and will be removed from Haystack in version 3.0. It is moving to
    the ``datadog-haystack`` package. To continue using it, install the package with
    ``pip install datadog-haystack`` and add the ``DatadogConnector`` component to your pipeline to enable
    tracing, or update your import as follows:

    .. code-block:: python

        from haystack_integrations.tracing.datadog import DatadogTracer

    Note that, starting with Haystack 3.0, Datadog tracing is no longer auto-enabled when ``ddtrace`` is
    installed. Use the ``DatadogConnector`` component to enable it.

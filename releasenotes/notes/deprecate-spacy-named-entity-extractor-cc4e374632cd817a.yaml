---
deprecations:
  - |
    The spacy backend of ``NamedEntityExtractor`` is deprecated and will be removed from Haystack in version 3.0.
    It is moving to the ``spacy-haystack`` package and being renamed to ``SpacyNamedEntityExtractor``. To continue
    using it, install the package with ``pip install spacy-haystack`` and update your import as follows:

    .. code-block:: python

        from haystack_integrations.components.extractors.spacy import SpacyNamedEntityExtractor

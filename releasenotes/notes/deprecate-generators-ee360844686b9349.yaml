---
deprecations:
  - |
    ``OpenAIGenerator``, ``AzureOpenAIGenerator``, ``HuggingFaceAPIGenerator``, and ``HuggingFaceLocalGenerator``
    have been deprecated and will be removed in Haystack 3.0. Generators living in Haystack Core Integrations
    will also be removed in Haystack 3.0.

    Their chat counterparts (``OpenAIChatGenerator``, ``AzureOpenAIChatGenerator``, ``HuggingFaceAPIChatGenerator``,
    ``HuggingFaceLocalChatGenerator``) are the replacement. Starting from Haystack 2.30.0, all ChatGenerators also
    accept a plain ``str`` as input to make the transition easier.

    **How to migrate:**

    **Direct usage (running a generator from Python code)**

    Before:

    .. code-block:: python

        from haystack.components.generators import OpenAIGenerator

        gen = OpenAIGenerator()
        result = gen.run("What is NLP?")
        text = result["replies"][0]   # str
        meta = result["meta"][0]      # dict with model metadata

    After:

    .. code-block:: python

        from haystack.components.generators.chat import OpenAIChatGenerator

        gen = OpenAIChatGenerator()
        result = gen.run("What is NLP?")   # str input accepted directly
        reply = result["replies"][0]       # ChatMessage
        text = reply.text                  # str
        meta = reply.meta                  # dict with model metadata (now on the message)

    **System prompt**

    Before:

    .. code-block:: python

        from haystack.components.generators import OpenAIGenerator

        gen = OpenAIGenerator(system_prompt="You are concise.")
        result = gen.run("What is NLP?")

    After:

    .. code-block:: python

        from haystack.components.generators.chat import OpenAIChatGenerator
        from haystack.dataclasses import ChatMessage

        gen = OpenAIChatGenerator()
        result = gen.run([
            ChatMessage.from_system("You are concise."),
            ChatMessage.from_user("What is NLP?"),
        ])

    **Pipeline usage**

    Pipelines that connected ``PromptBuilder`` (output: ``str``) to a legacy Generator continue to work unchanged
    when you swap in a ChatGenerator. The Haystack pipeline type system automatically converts ``str`` to
    ``list[ChatMessage]`` at the connection edge.

    Before:

    .. code-block:: python

        from haystack.components.generators import OpenAIGenerator
        from haystack.components.builders import PromptBuilder

        pipeline.add_component("prompt_builder", PromptBuilder(template=prompt_template))
        pipeline.add_component("llm", OpenAIGenerator())
        pipeline.connect("prompt_builder", "llm")   # str -> str

    After, minimal change (smart connection still works):

    .. code-block:: python

        from haystack.components.generators.chat import OpenAIChatGenerator
        from haystack.components.builders import PromptBuilder

        pipeline.add_component("prompt_builder", PromptBuilder(template=prompt_template))
        pipeline.add_component("llm", OpenAIChatGenerator())
        pipeline.connect("prompt_builder", "llm")   # str -> list[ChatMessage], auto-converted

    Alternatively, use ``ChatPromptBuilder``:

    .. code-block:: python

        from haystack.components.generators.chat import OpenAIChatGenerator
        from haystack.components.builders import ChatPromptBuilder
        from haystack.dataclasses import ChatMessage

        template = [ChatMessage.from_user(prompt_template)]
        pipeline.add_component("prompt_builder", ChatPromptBuilder(template=template))
        pipeline.add_component("llm", OpenAIChatGenerator())
        pipeline.connect("prompt_builder.prompt", "llm.messages")

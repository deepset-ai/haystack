---
features:
  - |
    All Haystack ``ChatGenerator`` components now also accept a plain string for the ``messages`` parameter in addition to
    a list of ``ChatMessage`` objects. The string is automatically converted into a list containing a ``ChatMessage``
    with the ``user`` role. This is done to simplify switching from Generators to ChatGenerators; Generators might be
    removed in Haystack 3.0.

    This applies to ``AzureOpenAIChatGenerator``, ``AzureOpenAIResponsesChatGenerator``, ``FallbackChatGenerator``,
    ``HuggingFaceAPIChatGenerator``, ``HuggingFaceLocalChatGenerator``, ``OpenAIChatGenerator``,
    and ``OpenAIResponsesChatGenerator``.

    The same change will be soon applied to ChatGenerators available in Haystack Core Integrations.

    Example:

    .. code-block:: python

        from haystack.components.generators.chat import OpenAIChatGenerator

        generator = OpenAIChatGenerator()

        # passing a string is equivalent to passing [ChatMessage.from_user("...")]
        response = generator.run("What's Natural Language Processing?")
        print(response["replies"][0].text)

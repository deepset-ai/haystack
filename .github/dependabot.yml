version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'daily'
    cooldown:
      default-days: 1

  - package-ecosystem: 'pip'
    directory: '/'
    schedule:
      interval: 'daily'
    cooldown:
      default-days: 1

  - package-ecosystem: 'npm'
    directory: '/docs-website'
    schedule:
      interval: 'weekly'
    cooldown:
      default-days: 1

name: Apply agent runtime budget patch

on:
  push:
    branches:
      - feat/agent-runtime-budget

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/agent-runtime-budget

      - name: Apply focused runtime-budget patch
        run: |
          python - <<'PY'
          from pathlib import Path

          agent_path = Path("haystack/components/agents/agent.py")
          text = agent_path.read_text()

          def replace_once(old: str, new: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"Expected one occurrence, found {count}: {old[:80]!r}")
              text = text.replace(old, new, 1)

          def replace_all(old: str, new: str, expected: int) -> None:
              global text
              count = text.count(old)
              if count != expected:
                  raise RuntimeError(f"Expected {expected} occurrences, found {count}: {old[:80]!r}")
              text = text.replace(old, new)

          replace_once("import inspect\nimport re\n", "import inspect\nimport re\nimport time\n")
          replace_once(
              "        max_agent_steps: int = 100,\n        streaming_callback: StreamingCallbackT | None = None,",
              "        max_agent_steps: int = 100,\n        max_agent_time_seconds: float | None = None,\n        streaming_callback: StreamingCallbackT | None = None,",
          )
          replace_once(
              "        :param max_agent_steps: Maximum number of steps the agent will run before stopping. Defaults to 100.\n"
              "            If the agent exceeds this number of steps, it will stop and return the current state.\n"
              "        :param streaming_callback:",
              "        :param max_agent_steps: Maximum number of steps the agent will run before stopping. Defaults to 100.\n"
              "            If the agent exceeds this number of steps, it will stop and return the current state.\n"
              "        :param max_agent_time_seconds: Optional maximum wall-clock runtime for one agent invocation, in seconds.\n"
              "            The limit is checked between component invocations. A currently running synchronous tool must\n"
              "            enforce its own timeout. Defaults to None.\n"
              "        :param streaming_callback:",
          )
          replace_once(
              "        # Validate state schema if provided\n",
              "        if max_agent_time_seconds is not None and max_agent_time_seconds <= 0:\n"
              "            raise ValueError(\"max_agent_time_seconds must be greater than zero when provided.\")\n\n"
              "        # Validate state schema if provided\n",
          )
          replace_once(
              "        self.max_agent_steps = max_agent_steps\n        self.raise_on_tool_invocation_failure",
              "        self.max_agent_steps = max_agent_steps\n        self.max_agent_time_seconds = max_agent_time_seconds\n        self.raise_on_tool_invocation_failure",
          )
          replace_once(
              "            max_agent_steps=self.max_agent_steps,\n            streaming_callback=",
              "            max_agent_steps=self.max_agent_steps,\n            max_agent_time_seconds=self.max_agent_time_seconds,\n            streaming_callback=",
          )
          replace_once(
              '                "haystack.agent.max_steps": self.max_agent_steps,\n                "haystack.agent.tools": self.tools,',
              '                "haystack.agent.max_steps": self.max_agent_steps,\n                "haystack.agent.max_time_seconds": self.max_agent_time_seconds,\n                "haystack.agent.tools": self.tools,',
          )
          replace_once(
              "            parent_span=parent_span,\n        )\n\n    def _initialize_fresh_execution(",
              "            parent_span=parent_span,\n        )\n\n"
              "    def _is_time_limit_exceeded(self, deadline: float | None) -> bool:\n"
              "        if deadline is None or time.monotonic() < deadline:\n"
              "            return False\n\n"
              "        logger.warning(\n"
              "            \"Agent reached maximum execution time of {max_agent_time_seconds} seconds, stopping.\",\n"
              "            max_agent_time_seconds=self.max_agent_time_seconds,\n"
              "        )\n"
              "        return True\n\n"
              "    def _initialize_fresh_execution(",
          )
          replace_all(
              "            span.set_content_tag(\"haystack.agent.input\", agent_inputs)\n\n            while exe_context.counter < self.max_agent_steps:\n",
              "            span.set_content_tag(\"haystack.agent.input\", agent_inputs)\n\n"
              "            deadline = (\n"
              "                time.monotonic() + self.max_agent_time_seconds\n"
              "                if self.max_agent_time_seconds is not None\n"
              "                else None\n"
              "            )\n\n"
              "            while exe_context.counter < self.max_agent_steps:\n"
              "                if self._is_time_limit_exceeded(deadline):\n"
              "                    break\n",
              2,
          )
          replace_all(
              "                # Exit for `exit_conditions=[\"text\"]` behavior: the agent stops when there is no tool invoker, or when\n",
              "                if self._is_time_limit_exceeded(deadline):\n"
              "                    break\n\n"
              "                # Exit for `exit_conditions=[\"text\"]` behavior: the agent stops when there is no tool invoker, or when\n",
              2,
          )
          agent_path.write_text(text)

          test_path = Path("test/components/agents/test_agent.py")
          test_text = test_path.read_text()
          expected = '                "max_agent_steps": 100,\n'
          replacements = test_text.count(expected)
          if replacements < 2:
              raise RuntimeError(f"Expected serialized Agent fixtures, found {replacements}")
          test_path.write_text(
              test_text.replace(expected, expected + '                "max_agent_time_seconds": None,\n')
          )

          Path("test/components/agents/test_agent_time_limit.py").write_text('''# SPDX-FileCopyrightText: 2022-present deepset GmbH <info@deepset.ai>\n#\n# SPDX-License-Identifier: Apache-2.0\n\nimport logging\nfrom typing import Any\n\nimport pytest\n\nfrom haystack import component\nfrom haystack.components.agents import Agent\nfrom haystack.dataclasses import ChatMessage, ToolCall\nfrom haystack.tools import Tool, Toolset\n\n\n@component\nclass LoopingChatGenerator:\n    def __init__(self) -> None:\n        self.calls = 0\n\n    def to_dict(self) -> dict[str, Any]:\n        return {"type": "LoopingChatGenerator", "data": {}}\n\n    @classmethod\n    def from_dict(cls, data: dict[str, Any]) -> "LoopingChatGenerator":\n        return cls()\n\n    @component.output_types(replies=list[ChatMessage])\n    def run(self, messages: list[ChatMessage], tools: list[Tool] | Toolset | None = None, **kwargs: Any) -> dict[str, Any]:\n        self.calls += 1\n        return {\n            "replies": [\n                ChatMessage.from_assistant(\n                    "Calling the loop tool.",\n                    tool_calls=[ToolCall(tool_name="loop", arguments={})],\n                )\n            ]\n        }\n\n    @component.output_types(replies=list[ChatMessage])\n    async def run_async(\n        self, messages: list[ChatMessage], tools: list[Tool] | Toolset | None = None, **kwargs: Any\n    ) -> dict[str, Any]:\n        return self.run(messages=messages, tools=tools, **kwargs)\n\n\ndef loop_tool() -> str:\n    return "looped"\n\n\ndef make_agent() -> tuple[Agent, LoopingChatGenerator]:\n    chat_generator = LoopingChatGenerator()\n    tool = Tool(\n        name="loop",\n        description="Return a loop marker.",\n        parameters={"type": "object", "properties": {}},\n        function=loop_tool,\n    )\n    return (\n        Agent(chat_generator=chat_generator, tools=[tool], max_agent_steps=10, max_agent_time_seconds=1.0),\n        chat_generator,\n    )\n\n\nclass TestAgentTimeLimit:\n    def test_requires_positive_time_limit(self) -> None:\n        with pytest.raises(ValueError, match="max_agent_time_seconds must be greater than zero"):\n            Agent(chat_generator=LoopingChatGenerator(), max_agent_time_seconds=0)\n\n    def test_serializes_time_limit(self) -> None:\n        agent, _ = make_agent()\n\n        assert agent.to_dict()["init_parameters"]["max_agent_time_seconds"] == 1.0\n\n    def test_stops_before_tool_invocation_when_time_limit_expires(\n        self, monkeypatch: pytest.MonkeyPatch, caplog: pytest.LogCaptureFixture\n    ) -> None:\n        agent, chat_generator = make_agent()\n        values = iter([10.0, 10.0, 11.0])\n        monkeypatch.setattr("haystack.components.agents.agent.time.monotonic", lambda: next(values))\n\n        with caplog.at_level(logging.WARNING):\n            result = agent.run(messages=[ChatMessage.from_user("Start")])\n\n        assert chat_generator.calls == 1\n        assert result["last_message"].tool_calls[0].tool_name == "loop"\n        assert "Agent reached maximum execution time of 1.0 seconds, stopping." in caplog.text\n\n    @pytest.mark.asyncio\n    async def test_stops_before_tool_invocation_when_time_limit_expires_async(\n        self, monkeypatch: pytest.MonkeyPatch, caplog: pytest.LogCaptureFixture\n    ) -> None:\n        agent, chat_generator = make_agent()\n        values = iter([10.0, 10.0, 11.0])\n        monkeypatch.setattr("haystack.components.agents.agent.time.monotonic", lambda: next(values))\n\n        with caplog.at_level(logging.WARNING):\n            result = await agent.run_async(messages=[ChatMessage.from_user("Start")])\n\n        assert chat_generator.calls == 1\n        assert result["last_message"].tool_calls[0].tool_name == "loop"\n        assert "Agent reached maximum execution time of 1.0 seconds, stopping." in caplog.text\n''')

          Path("releasenotes/notes/add-agent-runtime-budget-f3b6ce29.yaml").write_text('''---\nfeatures:\n  - |\n    Added an optional ``max_agent_time_seconds`` runtime budget to ``Agent``.\n    When configured, the agent stops before starting another component invocation\n    after the budget expires, complementing ``max_agent_steps`` for deployments\n    with slow or remote tools.\n''')
          PY

          python -m compileall -q haystack/components/agents/agent.py test/components/agents/test_agent_time_limit.py
          git diff --check
          rm .github/workflows/apply-agent-runtime-budget.yml
          git add haystack/components/agents/agent.py test/components/agents/test_agent.py test/components/agents/test_agent_time_limit.py releasenotes/notes/add-agent-runtime-budget-f3b6ce29.yaml .github/workflows/apply-agent-runtime-budget.yml
          git config user.name "camgrimsec"
          git config user.email "156701171+camgrimsec@users.noreply.github.com"
          git commit -m "feat: add agent runtime budget"
          git push origin HEAD:feat/agent-runtime-budget

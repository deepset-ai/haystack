name: Claude Code Review
# For deepset-ai org members: runs automatically on every PR
# For external contributors: runs when a maintainer adds the 'claude-review' label
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  pull_request_target:
    types: [labeled]

permissions:
  contents: read

jobs:
  claude-review:
    if: |
      (
        github.event_name == 'pull_request' &&
        !github.event.pull_request.head.repo.fork
      ) || (
        github.event_name == 'pull_request_target' &&
        github.event.label.name == 'claude-review'
      )
    runs-on: ubuntu-slim
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@fad22eb3fa582b7357fc0ea48af6645851b884fd # v1.0.161
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY_PR_REVIEWS_PUBLIC_REPOS }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review --comment ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'

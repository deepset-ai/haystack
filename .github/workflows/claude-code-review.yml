name: Claude Code Review
# For deepset-ai org members: runs automatically on every PR
# For external contributors: runs when a maintainer adds the 'claude-review' label
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  pull_request_target:
    types: [labeled]

permissions:
  contents: read

jobs:
  claude-review:
    if: |
      (
        github.event_name == 'pull_request' &&
        !github.event.pull_request.head.repo.fork
      ) || (
        github.event_name == 'pull_request_target' &&
        github.event.label.name == 'claude-review'
      )
    runs-on: ubuntu-slim
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@eee73e2ae5399c561de4ff038aa7b36a7aa991a7 # v1.0.143
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY_PR_REVIEWS_PUBLIC_REPOS }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review --comment ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'

name: Test Python snippets in docs

on:
  schedule:
    - cron: '17 3 * * *'  # daily at 03:17 UTC
  workflow_dispatch:
    inputs:
      haystack_version:
        description: 'Haystack version to test against (e.g., 2.16.1, main)'
        required: false
        default: 'main'
        type: string

env:
  PYTHON_VERSION: "3.11"

jobs:
  test-docs-snippets:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
      AZURE_OPENAI_AD_TOKEN: ${{ secrets.AZURE_OPENAI_AD_TOKEN }}
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      CORE_AZURE_CS_ENDPOINT: ${{ secrets.CORE_AZURE_CS_ENDPOINT }}
      HF_API_TOKEN: ${{ secrets.HUGGINGFACE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SERPERDEV_API_KEY: ${{ secrets.SERPERDEV_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "${{ env.PYTHON_VERSION }}"

      - name: Sync dev and test dependencies
        run: uv sync --group dev --group test

      - name: Generate API reference for Docusaurus
        run: uv run haystack-pydoc pydoc tmp_api_reference

      - name: Run snippet tests (verbose)
        run: uv run --with requests python docs-website/scripts/test_python_snippets.py --verbose tmp_api_reference/

  notify-slack-on-failure:
    if: failure() && github.ref_name == 'main'
    needs:
      - test-docs-snippets
    runs-on: ubuntu-slim
    steps:
      - uses: deepset-ai/notify-slack-action@3cda73b77a148f16f703274198e7771340cf862b # v1
        with:
          slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL_NOTIFICATIONS }}

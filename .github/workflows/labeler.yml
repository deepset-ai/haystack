name: "Labeler"
on:
- pull_request_target

permissions:
  contents: read

jobs:
  triage:
    runs-on: ubuntu-slim
    permissions:
      contents: read
      pull-requests: write
    steps:
    - uses: actions/labeler@bf12e9b00b37c5c0ca2b87b79b2daf7891dbda13 # v7.0.0
      with:
        repo-token: "${{ secrets.GITHUB_TOKEN }}"

name: Track issues with Github project

on:
  issues:
    types:
      - opened
      - labeled

jobs:
  add-bug-label:
    name: Add bug label on Bug type issues
    runs-on: ubuntu-slim
    if: >
      github.event.issue.type.name == 'Bug' &&
      (
        github.event.action == 'opened' ||
        contains(fromJSON('["P0", "P1", "P2", "P3"]'), github.event.label.name)
      )
    steps:
      - name: Add bug label
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh issue edit ${{ github.event.issue.html_url }} --add-label "bug"

  add-to-project:
    name: Add new issues to project for triage
    runs-on: ubuntu-slim
    steps:
      - uses: actions/add-to-project@244f685bbc3b7adfa8466e08b698b5577571133e # v1.0.2
        with:
          project-url: https://github.com/orgs/deepset-ai/projects/5
          github-token: ${{ secrets.GH_PROJECT_PAT }}
